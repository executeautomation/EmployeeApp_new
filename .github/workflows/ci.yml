name: CI – Build & Testsprite Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ sk-user-G4Da2KVOTpwGXdiX9Komh5D_c9nx-7_f9VTX3WGMh6yzi3wG7qFEG3zezutxuzqqQv6zfnplmH5SELlYYO7bIuMCQqCsvVdB32oMBkJMPZaSwJs-g9DVHMpyQecB6S3AsUA }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── 4. Build frontend ─────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── 5. Start servers ──────────────────────────────────────────────────────
      - name: Start backend server (port 4000)
        working-directory: backend
        run: node server.js &
        env:
          NODE_ENV: production

      - name: Start frontend preview server (port 5173)
        working-directory: frontend
        run: npx vite preview --port 5173 --host &

      # ── 6. Wait for both servers to be ready ──────────────────────────────────
      - name: Wait for backend (port 4000)
        run: |
          echo "Waiting for backend on port 4000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000 > /dev/null 2>&1 && echo "Backend is up" && break
            echo "  attempt $i/30 – retrying in 2s"
            sleep 2
          done

      - name: Wait for frontend preview (port 5173)
        run: |
          echo "Waiting for frontend on port 5173..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "Frontend is up" && break
            echo "  attempt $i/30 – retrying in 2s"
            sleep 2
          done

      # ── 7. Run Testsprite tests via MCP ───────────────────────────────────────
      # Invokes the `testsprite_generate_code_and_execute` MCP tool through the
      # package's built-in CLI command, using the existing test plan generated
      # by the TestSprite MCP server.
      - name: Run Testsprite frontend tests (MCP – generateCodeAndExecute)
        working-directory: frontend
        run: |
          npx -y @testsprite/testsprite-mcp@latest generateCodeAndExecute \
            --projectName "frontend" \
            --projectPath "$(pwd)" \
            --serverMode production \
            --additionalInstruction "The app requires login before accessing protected pages. Use username 'admin' and password 'password' for login. The backend API runs on http://localhost:4000. The frontend runs on http://localhost:5173. After login, the user is redirected to /list which shows the employee list."
        env:
          API_KEY: ${{ secrets.COPILOT_MCP_TESTSPRITE_API_KEY }}

      # ── 8. Upload Testsprite report (always, for visibility on failures) ──────
      - name: Upload Testsprite test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-report
          path: frontend/testsprite_tests/
          retention-days: 7
